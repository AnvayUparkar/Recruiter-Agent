  - ChatGPT was used for prompt engineering to create optimized prompts for Cursor, Claude, and Gemini, accelerating feature implementation and debugging.

# ============================================================================
# Approach summary (optional but recommended)
# ============================================================================
methodology_summary: |
  Our Recruiter Agent utilizes a hybrid ranking approach designed for scale and precision. 
  The system employs a two-stage pipeline: First, a Retrieval stage combines BM25 lexical matching with FAISS-based semantic vector search. These dual signals are synthesized using Reciprocal Rank Fusion (RRF) to identify high-potential candidates efficiently from the full dataset. 
  
  The second stage, Ranking, applies a multi-dimensional scoring model that evaluates deep alignment across technical skills, professional experience, and behavioral indicators. We explicitly incorporate a "Recruiter Trust Service" layer to filter for candidate quality, penalizing potential resume keyword stuffing and verifying tenure patterns. By balancing semantic relevance with structured profile constraints, our model ensures that top-ranked candidates are both technically qualified and professionally authentic. 
  
  The final output is optimized for both individual candidate discovery and high-volume recruiting workflows, providing a transparent, robust scoring mechanism that allows recruiters to filter and export high-confidence dossiers while maintaining system performance within local compute constraints.

